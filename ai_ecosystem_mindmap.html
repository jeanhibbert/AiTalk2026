
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans,sans-serif)}
#mm-wrap{width:100%;overflow:hidden;position:relative;border-radius:var(--border-radius-lg,12px);border:1px solid var(--color-border-tertiary);background:var(--color-background-secondary)}
#mm-canvas{position:relative;cursor:grab;user-select:none}
#mm-canvas.dragging{cursor:grabbing}
svg#mm-svg{position:absolute;top:0;left:0;pointer-events:none;overflow:visible}
.mm-node{position:absolute;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;cursor:pointer;transition:transform .15s,box-shadow .15s;line-height:1.3}
.mm-node:hover{transform:scale(1.06);z-index:100}
.mm-node .label{font-size:12px;font-weight:500;color:var(--color-text-primary)}
.mm-node .sub{font-size:10px;font-weight:400;color:var(--color-text-secondary);margin-top:2px}
.mm-node.root{width:110px;height:110px;border-radius:55px;border:2px solid #534AB7;background:#EEEDFE;z-index:50}
.mm-node.root .label{font-size:13px;font-weight:500;color:#3C3489}
.mm-node.company{width:90px;height:90px;border-radius:45px;border:1.5px solid #0F6E56;background:#E1F5EE}
.mm-node.company .label{color:#085041}
.mm-node.model{width:80px;height:44px;border-radius:8px;border:1px solid #3C3489;background:#EEEDFE}
.mm-node.model .label{font-size:11px;color:#3C3489}
.mm-node.tool{width:84px;height:44px;border-radius:8px;border:1px solid #993C1D;background:#FAECE7}
.mm-node.tool .label{font-size:11px;color:#711B0C}
.mm-node.agentic{width:84px;height:44px;border-radius:8px;border:1px solid #854F0B;background:#FAEEDA}
.mm-node.agentic .label{font-size:11px;color:#633806}
.mm-node.search{width:84px;height:44px;border-radius:8px;border:1px solid #185FA5;background:#E6F1FB}
.mm-node.search .label{font-size:11px;color:#0C447C}
.mm-node.open{width:84px;height:44px;border-radius:8px;border:1px solid #3B6D11;background:#EAF3DE}
.mm-node.open .label{font-size:11px;color:#27500A}
#legend{display:flex;flex-wrap:wrap;gap:8px;padding:10px 14px;border-top:1px solid var(--color-border-tertiary);background:var(--color-background-primary)}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--color-text-secondary)}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
#controls{display:flex;gap:8px;padding:8px 12px;border-bottom:1px solid var(--color-border-tertiary);background:var(--color-background-primary)}
#controls button{font-size:12px;padding:4px 10px;border-radius:6px;border:1px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-primary);cursor:pointer}
#controls button:hover{background:var(--color-background-tertiary)}
#tooltip{position:fixed;background:var(--color-background-primary);border:1px solid var(--color-border-secondary);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--color-text-primary);max-width:220px;pointer-events:none;opacity:0;transition:opacity .15s;z-index:9999;line-height:1.5}
</style>
<div id="tooltip"></div>
<div id="controls">
  <button onclick="zoom(1.2)">＋ Zoom in</button>
  <button onclick="zoom(0.83)">－ Zoom out</button>
  <button onclick="resetView()">⟳ Reset</button>
  <span style="font-size:11px;color:var(--color-text-secondary);margin-left:4px;align-self:center">Drag to pan · hover nodes for details</span>
</div>
<div id="mm-wrap" style="height:580px">
  <div id="mm-canvas" style="width:2200px;height:1600px">
    <svg id="mm-svg" width="2200" height="1600"></svg>
  </div>
</div>
<div id="legend">
  <div class="leg-item"><div class="leg-dot" style="background:#9FE1CB;border:1px solid #0F6E56"></div>Company / Provider</div>
  <div class="leg-item"><div class="leg-dot" style="background:#CECBF6;border:1px solid #534AB7"></div>LLM Models</div>
  <div class="leg-item"><div class="leg-dot" style="background:#F5C4B3;border:1px solid #993C1D"></div>Developer Tools</div>
  <div class="leg-item"><div class="leg-dot" style="background:#FAC775;border:1px solid #854F0B"></div>Agentic / AI Assistants</div>
  <div class="leg-item"><div class="leg-dot" style="background:#B5D4F4;border:1px solid #185FA5"></div>Search / Research Tools</div>
  <div class="leg-item"><div class="leg-dot" style="background:#C0DD97;border:1px solid #3B6D11"></div>Open Source / Self-host</div>
</div>
<script>
const CX=1100,CY=800;
const nodes=[
  {id:'root',x:CX,y:CY,type:'root',label:'AI\nEcosystem',info:'The global AI model & tooling landscape — companies exposing APIs, their models, and the tools built on top.'},

  // Companies (ring 1)
  {id:'anthropic',x:CX-420,y:CY-340,type:'company',label:'Anthropic',info:'Safety-focused AI lab. Creator of Claude. Based in San Francisco.'},
  {id:'openai',x:CX+60,y:CY-440,type:'company',label:'OpenAI',info:'Creator of GPT and o-series models. Offers ChatGPT, DALL-E, Codex, and the OpenAI API.'},
  {id:'google',x:CX+420,y:CY-300,type:'company',label:'Google\nDeepMind',info:'Creator of Gemini, Gemma, and Veo. Accessible via Google AI Studio and Vertex AI.'},
  {id:'meta',x:CX+500,y:CY+80,type:'company',label:'Meta AI',info:'Creator of Llama open-weight model family. Released under custom Meta licence.'},
  {id:'microsoft',x:CX+380,y:CY+380,type:'company',label:'Microsoft\n/ Azure',info:'Hosts OpenAI models on Azure. Creator of GitHub Copilot and Phi model family. Co-invested in OpenAI.'},
  {id:'xai',x:CX-80,y:CY+480,type:'company',label:'xAI',info:'Elon Musk\'s AI lab. Creator of the Grok model family with 2M token context. API at console.x.ai'},
  {id:'mistral',x:CX-460,y:CY+340,type:'company',label:'Mistral AI',info:'European AI lab. Releases open-weight (Apache 2.0) and commercial models. API at console.mistral.ai'},
  {id:'deepseek',x:CX-520,y:CY+40,type:'company',label:'DeepSeek',info:'Chinese AI lab. Created DeepSeek V3 and R1 under MIT licence. API and self-hostable weights available.'},

  // Anthropic models & tools
  {id:'claude-opus',x:CX-680,y:CY-480,type:'model',label:'Claude Opus 4.6',info:'Most powerful Claude model. Excels at complex reasoning, long-context tasks, and advanced coding.'},
  {id:'claude-sonnet',x:CX-580,y:CY-560,type:'model',label:'Claude Sonnet 4.6',info:'Best-value Claude model. Strong coding, analysis, and agentic capabilities.'},
  {id:'claude-haiku',x:CX-460,y:CY-540,type:'model',label:'Claude Haiku 4.5',info:'Fastest and most compact Claude model. Ideal for high-volume tasks requiring low latency.'},
  {id:'claude-code',x:CX-760,y:CY-340,type:'tool',label:'Claude Code',info:'CLI agentic coding tool by Anthropic. Directly edits files, runs tests, and manages codebases autonomously.'},
  {id:'claudeai',x:CX-800,y:CY-200,type:'tool',label:'Claude.ai',info:'Anthropic\'s consumer chat interface. Available on web, iOS and Android.'},

  // OpenAI models & tools
  {id:'gpt5',x:CX+60,y:CY-660,type:'model',label:'GPT-5.4',info:'OpenAI\'s latest flagship model. Matches or exceeds human professionals 83% of the time across 44 occupations.'},
  {id:'o4mini',x:CX+200,y:CY-620,type:'model',label:'o4-mini',info:'OpenAI\'s cost-efficient reasoning model. Strong performance on maths, science and coding tasks.'},
  {id:'codex',x:CX-80,y:CY-620,type:'tool',label:'Codex',info:'OpenAI\'s cloud-based AI coding agent. Runs in a sandboxed environment and handles multi-step coding tasks.'},
  {id:'chatgpt',x:CX-200,y:CY-560,type:'tool',label:'ChatGPT',info:'OpenAI\'s flagship consumer interface. 200M+ weekly users. Supports GPT-5, image gen, voice and browsing.'},
  {id:'dalle',x:CX+320,y:CY-580,type:'tool',label:'DALL-E 3',info:'OpenAI\'s image generation model, integrated into ChatGPT and the API.'},
  {id:'whisper',x:CX+380,y:CY-500,type:'tool',label:'Whisper',info:'OpenAI\'s open-source speech recognition model. Highly accurate transcription in 100+ languages.'},
  {id:'sora',x:CX+300,y:CY-480,type:'tool',label:'Sora',info:'OpenAI\'s text-to-video generation model. Creates cinematic short clips from text prompts.'},

  // Google models & tools
  {id:'gemini-pro',x:CX+660,y:CY-440,type:'model',label:'Gemini 2.5 Pro',info:'Google\'s flagship reasoning model. 1M token context window. Strong multimodal and coding capabilities.'},
  {id:'gemini-flash',x:CX+740,y:CY-300,type:'model',label:'Gemini Flash',info:'Google\'s fast, cost-efficient model family. Free tier available via Google AI Studio API.'},
  {id:'gemma4',x:CX+780,y:CY-160,type:'open',label:'Gemma 4',info:'Google\'s open-weight model. Released under Apache 2.0. Self-hostable via Hugging Face.'},
  {id:'gemini-studio',x:CX+600,y:CY-160,type:'tool',label:'AI Studio',info:'Google\'s free developer platform for Gemini API access. Generous free tier with no credit card required.'},
  {id:'vertex',x:CX+700,y:CY-50,type:'tool',label:'Vertex AI',info:'Google Cloud\'s enterprise AI platform. Hosts Gemini, Llama, Mistral and more behind enterprise SLAs.'},
  {id:'notebooklm',x:CX+560,y:CY+60,type:'tool',label:'NotebookLM',info:'Google\'s AI-powered research notebook. Creates audio overviews and interactive summaries from your docs.'},

  // Meta models
  {id:'llama4',x:CX+680,y:CY+180,type:'open',label:'Llama 4\nMaverick',info:'Meta\'s 400B parameter open-weight model. 1M token context. Custom Meta licence (not full OSS).'},
  {id:'llama4-scout',x:CX+700,y:CY+300,type:'open',label:'Llama 4\nScout',info:'Meta\'s efficient MoE model with 10M token context window — largest in the world. Single H100 deployable.'},

  // Microsoft tools & models
  {id:'copilot',x:CX+560,y:CY+460,type:'tool',label:'GitHub\nCopilot',info:'Microsoft\'s AI pair programmer. Integrated into VS Code, JetBrains, Vim and more. Powered by OpenAI models.'},
  {id:'copilot365',x:CX+420,y:CY+520,type:'tool',label:'M365\nCopilot',info:'AI assistant embedded across Word, Excel, PowerPoint, Teams and Outlook.'},
  {id:'phi4',x:CX+340,y:CY+480,type:'open',label:'Phi-4',info:'Microsoft\'s compact open-weight model. 14B parameters. MIT licence. Strong reasoning per parameter count.'},
  {id:'azure-oai',x:CX+480,y:CY+380,type:'tool',label:'Azure\nOpenAI',info:'Enterprise hosting for OpenAI models (GPT-5, o4) on Azure. 99.9% SLA, HIPAA and SOC2 compliance.'},

  // xAI models
  {id:'grok4',x:CX-160,y:CY+660,type:'model',label:'Grok 4',info:'xAI\'s frontier model. 256K context. Real-time X/Twitter data access. Strong reasoning on intelligence benchmarks.'},
  {id:'grok-fast',x:CX+40,y:CY+660,type:'model',label:'Grok 4.1 Fast',info:'xAI\'s speed-optimised model. 2M token context. $0.20/$0.50 per million tokens. Near-frontier performance.'},

  // Mistral models
  {id:'mistral-medium',x:CX-660,y:CY+460,type:'model',label:'Mistral\nMedium 3',info:'Mistral\'s commercial frontier model. Near-Claude Sonnet performance at 8x lower cost. $0.40/$2 per million tokens.'},
  {id:'mistral-7b',x:CX-720,y:CY+340,type:'open',label:'Mistral 7B',info:'Mistral\'s popular open-weight model. Apache 2.0 licence. Excellent quality-to-size ratio. Free to self-host.'},
  {id:'codestral',x:CX-760,y:CY+200,type:'tool',label:'Codestral',info:'Mistral\'s specialised code model. Outperforms OpenAI embeddings on code retrieval benchmarks.'},

  // DeepSeek models
  {id:'dsv3',x:CX-700,y:CY-60,type:'open',label:'DeepSeek V3',info:'DeepSeek\'s flagship open-weight model. MIT licence. 671B total / 37B active MoE. Trained for ~$5.5M.'},
  {id:'dsr1',x:CX-740,y:CY+100,type:'open',label:'DeepSeek R1',info:'DeepSeek\'s reasoning model. MIT licence. $0.55/M tokens via API. Matches GPT-4 class at a fraction of cost.'},

  // Aggregator / Platform layer
  {id:'huggingface',x:CX-300,y:CY-700,type:'company',label:'Hugging\nFace',info:'60,000+ models. Central hub for open-source AI. Inference API, Spaces, and model hosting platform.'},
  {id:'together',x:CX-140,y:CY-740,type:'company',label:'Together AI',info:'Single API for 200+ open and partner models. Serverless inference. Good for Llama, Mistral, Qwen.'},
  {id:'bedrock',x:CX+200,y:CY+540,type:'tool',label:'Amazon\nBedrock',info:'AWS managed service. Access Claude, Llama, Mistral, Titan in one place. Enterprise security & billing.'},
  {id:'openrouter',x:CX-300,y:CY+660,type:'tool',label:'OpenRouter',info:'API aggregator. Single key for GPT, Claude, Gemini, Mistral, Llama and more. Good for model comparisons.'},

  // New/agentic tools
  {id:'openclaw',x:CX-220,y:CY+760,type:'agentic',label:'OpenClaw',info:'Open-source autonomous AI agent framework. 280K+ GitHub stars. Self-hostable on Azure VM. Multi-step task execution.'},
  {id:'perplexity',x:CX-80,y:CY+800,type:'search',label:'Perplexity\nAI',info:'AI-powered search engine. Real-time web search with cited sources. Pro version unlocks Claude and GPT models.'},
  {id:'hermes',x:CX+100,y:CY+780,type:'open',label:'Hermes',info:'Nous Research\'s fine-tuned open-source model family. Strong instruction following and function calling.'},
  {id:'paperclip',x:CX+240,y:CY+720,type:'agentic',label:'Paperclip',info:'AI productivity and document automation tool. Experimental agentic workflows for file and task management.'},
  {id:'notdiamond',x:CX-400,y:CY+720,type:'agentic',label:'NotDiamond',info:'AI model router. Automatically selects the best LLM for each query to optimise cost and quality.'},
  {id:'cohere',x:CX-560,y:CY-100,type:'company',label:'Cohere',info:'Enterprise-focused AI. Strong RAG, embeddings and fine-tuning API. Command R+ model. cohere.com'},
  {id:'command-r',x:CX-700,y:CY-200,type:'model',label:'Command R+',info:'Cohere\'s flagship RAG-optimised model. Fine-tuning API from $3/M training tokens.'},
  {id:'qwen',x:CX+140,y:CY-800,type:'open',label:'Qwen 3.5\n(Alibaba)',info:'Alibaba\'s open-weight model family. Apache 2.0. 235B parameter model. 1M token context. Multilingual.'},
  {id:'groq',x:CX-140,y:CY-800,type:'tool',label:'Groq',info:'Ultra-fast inference hardware and API. LPU chips deliver industry-leading token generation speed.'},
];

const edges=[
  ['root','anthropic'],['root','openai'],['root','google'],['root','meta'],
  ['root','microsoft'],['root','xai'],['root','mistral'],['root','deepseek'],
  ['root','huggingface'],['root','together'],['root','cohere'],
  // Anthropic
  ['anthropic','claude-opus'],['anthropic','claude-sonnet'],['anthropic','claude-haiku'],
  ['anthropic','claude-code'],['anthropic','claudeai'],
  // OpenAI
  ['openai','gpt5'],['openai','o4mini'],['openai','codex'],['openai','chatgpt'],
  ['openai','dalle'],['openai','whisper'],['openai','sora'],
  // Google
  ['google','gemini-pro'],['google','gemini-flash'],['google','gemma4'],
  ['google','gemini-studio'],['google','vertex'],['google','notebooklm'],
  // Meta
  ['meta','llama4'],['meta','llama4-scout'],
  // Microsoft
  ['microsoft','copilot'],['microsoft','copilot365'],['microsoft','phi4'],
  ['microsoft','azure-oai'],
  // xAI
  ['xai','grok4'],['xai','grok-fast'],
  // Mistral
  ['mistral','mistral-medium'],['mistral','mistral-7b'],['mistral','codestral'],
  // DeepSeek
  ['deepseek','dsv3'],['deepseek','dsr1'],
  // Cohere
  ['cohere','command-r'],
  // Aggregators
  ['root','bedrock'],['root','openrouter'],
  ['bedrock','azure-oai'],
  // New tools
  ['root','openclaw'],['root','perplexity'],['root','hermes'],
  ['root','paperclip'],['root','notdiamond'],
  ['root','qwen'],['root','groq'],
];

const nodeMap={};
nodes.forEach(n=>{nodeMap[n.id]=n});

let scale=0.48,offX=0,offY=0,dragging=false,startX=0,startY=0,startOffX=0,startOffY=0;
const wrap=document.getElementById('mm-wrap');
const canvas=document.getElementById('mm-canvas');
const svg=document.getElementById('mm-svg');
const tip=document.getElementById('tooltip');

function applyTransform(){
  canvas.style.transform=`translate(${offX}px,${offY}px) scale(${scale})`;
  canvas.style.transformOrigin='0 0';
}

function resetView(){
  scale=0.48; offX=0; offY=0; applyTransform();
}
function zoom(f){
  const ww=wrap.clientWidth,wh=wrap.clientHeight;
  const cx=ww/2,cy=wh/2;
  offX=cx-(cx-offX)*f;
  offY=cy-(cy-offY)*f;
  scale*=f;
  applyTransform();
}

wrap.addEventListener('mousedown',e=>{
  dragging=true; canvas.classList.add('dragging');
  startX=e.clientX; startY=e.clientY;
  startOffX=offX; startOffY=offY;
});
window.addEventListener('mousemove',e=>{
  if(!dragging)return;
  offX=startOffX+(e.clientX-startX);
  offY=startOffY+(e.clientY-startY);
  applyTransform();
});
window.addEventListener('mouseup',()=>{dragging=false;canvas.classList.remove('dragging')});
wrap.addEventListener('wheel',e=>{
  e.preventDefault();
  const f=e.deltaY<0?1.1:0.91;
  const rect=wrap.getBoundingClientRect();
  const mx=e.clientX-rect.left,my=e.clientY-rect.top;
  offX=mx-(mx-offX)*f;
  offY=my-(my-offY)*f;
  scale*=f;
  applyTransform();
},{passive:false});

// Draw SVG edges
const edgeColors={
  company:'#1D9E75',model:'#534AB7',tool:'#993C1D',
  agentic:'#854F0B',search:'#185FA5',open:'#3B6D11',root:'#534AB7'
};
edges.forEach(([a,b])=>{
  const n1=nodeMap[a],n2=nodeMap[b];
  if(!n1||!n2)return;
  const x1=n1.x,y1=n1.y,x2=n2.x,y2=n2.y;
  const color=edgeColors[n2.type]||'#999';
  const line=document.createElementNS('http://www.w3.org/2000/svg','line');
  line.setAttribute('x1',x1);line.setAttribute('y1',y1);
  line.setAttribute('x2',x2);line.setAttribute('y2',y2);
  line.setAttribute('stroke',color);
  line.setAttribute('stroke-width','1.2');
  line.setAttribute('stroke-opacity','0.35');
  svg.appendChild(line);
});

// Create DOM nodes
nodes.forEach(n=>{
  const el=document.createElement('div');
  el.className='mm-node '+n.type;
  const hw=n.type==='root'?55:n.type==='company'?45:42;
  const hh=n.type==='root'?55:n.type==='company'?45:22;
  el.style.left=(n.x-hw)+'px';
  el.style.top=(n.y-hh)+'px';
  el.innerHTML=n.label.split('\n').map((l,i)=>`<span class="${i===0?'label':'sub'}">${l}</span>`).join('');
  el.addEventListener('mouseenter',e=>{
    tip.style.opacity='1';
    tip.innerHTML=`<strong>${n.label.replace('\n',' ')}</strong><br><span style="color:var(--color-text-secondary)">${n.info}</span>`;
  });
  el.addEventListener('mousemove',e=>{
    tip.style.left=(e.clientX+14)+'px';
    tip.style.top=(e.clientY-10)+'px';
  });
  el.addEventListener('mouseleave',()=>{tip.style.opacity='0'});
  canvas.appendChild(el);
});

resetView();
</script>
